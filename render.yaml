services:
  - type: web
    name: apex-market-ledger
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DB_PATH
        value: data/db.json
      - key: GITHUB_BACKUP_TOKEN
        sync: false
      - key: GITHUB_BACKUP_REPO
        sync: false
      - key: GITHUB_BACKUP_PATH
        value: data/render-db-backup.json
      - key: GITHUB_BACKUP_BRANCH
        value: main
      - key: SITE_NAME
        value: Apex Market Ledger
      - key: SESSION_SECRET
        sync: false
      - key: WALLET_ENCRYPTION_KEY
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: COMPANY_EMAIL
        sync: false
      - key: COMPANY_PHONE
        sync: false
      - key: COMPANY_ADDRESS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
